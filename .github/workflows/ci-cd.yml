name: Sample CI/CD

on:
  push:
    branches:
      - main
      - develop
      - yyy1277
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sample tests
        run: |
          echo "Running sample test suite..."
          python - <<'PY'
          print("Sample test passed")
          PY

  deploy:
    needs: test
    if: github.ref == 'refs/heads/yyy1277' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploy step placeholder"
          echo "Application would be deployed here"
